name: lexicon
description: Lexicon — a personal-reference-book style dictionary app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  dio: ^5.7.0
  translator: ^1.0.4+1
  share_plus: ^13.2.0
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/words_en.txt
    - assets/data/ielts_word_bank.json
    - assets/data/ielts_paraphrase_bank.json